services:
  - type: web
    name: truestructure-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: truestructure-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OBJECT_STORAGE_PROVIDER
        value: local
      - key: LLM_PROVIDER
        value: mock

databases:
  - name: truestructure-db
    databaseName: assurance_os
    user: assurance_os
